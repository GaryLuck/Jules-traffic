<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freeway Traffic Simulation</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        .container {
            max-width: 1040px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-bottom: 20px;
            padding: 15px;
            background: #eef2f5;
            border-radius: 8px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        label {
            font-weight: bold;
            margin-bottom: 5px;
        }
        input[type="range"] {
            width: 150px;
            cursor: pointer;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background-color: #007bff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #0056b3;
        }
        button.secondary {
            background-color: #6c757d;
        }
        button.secondary:hover {
            background-color: #5a6268;
        }
        .canvas-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        canvas {
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            font-size: 14px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .color-box {
            width: 15px;
            height: 15px;
            border-radius: 3px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Freeway Traffic Simulation</h1>

    <div class="controls">
        <div class="control-group">
            <label for="arrivalRate">Arrival Rate: <span id="rateValue">0.5</span></label>
            <input type="range" id="arrivalRate" min="0" max="1" step="0.05" value="0.5">
        </div>
        <button id="startStopBtn">Pause</button>
        <button id="resetBtn" class="secondary">Reset</button>
    </div>

    <div class="canvas-container">
        <!-- Current state of the road -->
        <div>
            <h3 style="margin: 0 0 5px 0; text-align: center;">Current Road State</h3>
            <canvas id="roadCanvas" width="1000" height="50"></canvas>
        </div>

        <!-- Space-time diagram -->
        <div>
            <h3 style="margin: 10px 0 5px 0; text-align: center;">Space-Time Diagram (History)</h3>
            <canvas id="historyCanvas" width="1000" height="400"></canvas>
        </div>
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="color-box" style="background-color: #ff0000;"></div>
            <span>Stopped (v=0)</span>
        </div>
        <div class="legend-item">
            <div class="color-box" style="background-color: #ff9900;"></div>
            <span>Slow</span>
        </div>
        <div class="legend-item">
            <div class="color-box" style="background-color: #00ff00;"></div>
            <span>Fast</span>
        </div>
    </div>
</div>

<script>
    const L = 1000;
    const VMAX = 100;
    const P = 0.10;

    let cars = []; // Array of {x, v}
    let isRunning = true;
    let arrivalRate = 0.5;

    const roadCanvas = document.getElementById('roadCanvas');
    const ctxRoad = roadCanvas.getContext('2d');

    const historyCanvas = document.getElementById('historyCanvas');
    const ctxHistory = historyCanvas.getContext('2d');
    let historyRow = 0;

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function init() {
        cars = [];

        // 400 cars in the jam (cells 400 to 799)
        for (let i = 400; i < 800; i++) {
            cars.push({ x: i, v: 0 });
        }

        // 100 cars randomly to the left (cells 0 to 399)
        let leftPositions = [];
        for (let i = 0; i < 400; i++) leftPositions.push(i);
        shuffle(leftPositions);
        for (let i = 0; i < 100; i++) {
            cars.push({ x: leftPositions[i], v: 0 });
        }

        // 100 cars randomly to the right (cells 800 to 999)
        let rightPositions = [];
        for (let i = 800; i < 1000; i++) rightPositions.push(i);
        shuffle(rightPositions);
        for (let i = 0; i < 100; i++) {
            cars.push({ x: rightPositions[i], v: 0 });
        }

        // Sort cars by position (x)
        cars.sort((a, b) => a.x - b.x);

        // Clear history canvas
        ctxHistory.fillStyle = '#ffffff';
        ctxHistory.fillRect(0, 0, L, historyCanvas.height);
        historyRow = 0;

        draw();
    }

    function update() {
        let newCars = [];

        // Process each car
        for (let i = 0; i < cars.length; i++) {
            let car = cars[i];
            // Calculate distance to next car
            let j = (i + 1 < cars.length) ? (cars[i+1].x - car.x) : Infinity;
            let v = car.v;

            // 1. Acceleration
            if (v < VMAX && j > v + 1) {
                v = v + 1;
            }

            // 2. Slowing down
            if (j <= v) {
                v = j - 1;
            }

            // 3. Randomization
            if (v > 0 && Math.random() < P) {
                v = v - 1;
            }

            // 4. Car motion
            let newX = car.x + v;

            // Keep the car if it hasn't departed to the right
            if (newX < L) {
                newCars.push({ x: newX, v: v });
            }
        }

        // Cars randomly arrive from the left
        let cell0Occupied = newCars.length > 0 && newCars[0].x === 0;
        if (!cell0Occupied && Math.random() < arrivalRate) {
            newCars.unshift({ x: 0, v: 0 });
        }

        cars = newCars;
    }

    function getSpeedColor(v) {
        // Map velocity to a color from red (v=0) to green (v >= 10)
        // We cap the color at v=10 because most variations happen at lower speeds
        let cappedV = Math.min(v, 10);
        let r = Math.min(255, Math.max(0, 255 * (1 - cappedV / 10)));
        let g = Math.min(255, Math.max(0, 255 * (cappedV / 10)));
        return `rgb(${Math.floor(r)}, ${Math.floor(g)}, 0)`;
    }

    function draw() {
        // Draw the current road state
        ctxRoad.fillStyle = '#444'; // Dark gray road
        ctxRoad.fillRect(0, 0, L, roadCanvas.height);

        for (let car of cars) {
            ctxRoad.fillStyle = getSpeedColor(car.v);
            // Draw each car as a 1-pixel wide line
            ctxRoad.fillRect(car.x, 5, 1, roadCanvas.height - 10);
        }

        // Draw the history (space-time diagram)
        if (historyRow >= historyCanvas.height) {
            // Scroll the history canvas up by 1 pixel
            let imgData = ctxHistory.getImageData(0, 1, L, historyCanvas.height - 1);
            ctxHistory.putImageData(imgData, 0, 0);
            historyRow = historyCanvas.height - 1;

            // Clear the bottom row
            ctxHistory.fillStyle = '#ffffff';
            ctxHistory.fillRect(0, historyRow, L, 1);
        }

        for (let car of cars) {
            ctxHistory.fillStyle = getSpeedColor(car.v);
            ctxHistory.fillRect(car.x, historyRow, 1, 1);
        }
        historyRow++;
    }

    let lastTime = 0;
    const stepTime = 50; // milliseconds per simulation step (20 updates/sec)

    function loop(timestamp) {
        if (!lastTime) lastTime = timestamp;
        let deltaTime = timestamp - lastTime;

        if (isRunning && deltaTime >= stepTime) {
            update();
            draw();
            lastTime = timestamp;
        }
        requestAnimationFrame(loop);
    }

    // Event Listeners
    document.getElementById('arrivalRate').addEventListener('input', (e) => {
        arrivalRate = parseFloat(e.target.value);
        document.getElementById('rateValue').textContent = arrivalRate.toFixed(2);
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
        init();
    });

    document.getElementById('startStopBtn').addEventListener('click', (e) => {
        isRunning = !isRunning;
        e.target.textContent = isRunning ? 'Pause' : 'Start';
    });

    // Start simulation
    init();
    requestAnimationFrame(loop);
</script>

</body>
</html>
